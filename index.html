<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Benvenuti · Corso Francia 2 TER, Torino</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fbf7f2;
      color: #2e2620;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
    }

    .photos {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 780px;
      margin-bottom: 32px;
    }
    .photos img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 22px;
      border: 1px solid #ece2d6;
      box-shadow: 0 10px 32px rgba(120,80,40,.12);
    }

    .title {
      text-align: center;
      margin-bottom: 10px;
    }
    .kicker {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #a85a2e;
      font-weight: 900;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.6rem);
      letter-spacing: -.05em;
      line-height: 1;
      color: #7a4a2b;
      margin-bottom: 6px;
    }
    .address {
      font-size: .95rem;
      color: #7a6f64;
      margin-bottom: 32px;
    }

    .langs {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .langs a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: #fff;
      border: 1px solid #ece2d6;
      border-radius: 20px;
      padding: 20px 32px;
      box-shadow: 0 8px 24px rgba(120,80,40,.10);
      transition: transform .15s, box-shadow .15s;
      min-width: 130px;
    }
    .langs a:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(120,80,40,.18);
    }
    .langs a .flag { font-size: 2.4rem; }
    .langs a .label {
      font-size: 1rem;
      font-weight: 900;
      color: #7a4a2b;
    }

    footer {
      margin-top: 36px;
      font-size: .8rem;
      color: #bdb0a4;
      text-align: center;
    }

    @media (max-width: 600px) {
      .photos { grid-template-columns: 1fr; }
      .photos img { height: 200px; }
      .langs a { padding: 16px 24px; min-width: 110px; }
    }
  </style>
</head>
<body>

  <div class="photos">
    <!-- Sostituisci i src con i nomi reali delle tue foto -->
    <img src="assets/casa.jpg" alt="La nostra casa a Torino">
    <img src="assets/famiglia.jpg" alt="La famiglia Bonelli">
  </div>

  <div class="title">
    <div class="kicker">HomeExchange · Torino</div>
    <h1>Benvenuti a casa nostra</h1>
  </div>
  <div class="address">Corso Francia 2 TER, 10143 Torino</div>

  <div class="langs">
    <a href="it.html">
      <span class="flag">🇮🇹</span>
      <span class="label">Italiano</span>
    </a>
    <a href="en.html">
      <span class="flag">🇬🇧</span>
      <span class="label">English</span>
    </a>
    <a href="fr.html">
      <span class="flag">🇫🇷</span>
      <span class="label">Français</span>
    </a>
  </div>

  <footer>Casa Bonelli · Torino</footer>

</body>
</html>
